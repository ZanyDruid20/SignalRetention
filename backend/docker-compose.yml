services:
  postgres:
    image: postgres:16
    container_name: signal_retention_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: signal_retention_dev
    ports:
      - "5432:5432"
    volumes:
      - signal_retention_postgres_data:/var/lib/postgresql/data

volumes:
  signal_retention_postgres_data: