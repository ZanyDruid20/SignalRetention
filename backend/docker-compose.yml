services:
  postgres:
    image: postgres:16
    container_name: signal_retention_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: signal_retention_dev
    ports:
      - "5433:5432"
    volumes:
      - signal_retention_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: signal_retention_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - signal_retention_redis_data:/data

volumes:
  signal_retention_postgres_data:
  signal_retention_redis_data:
